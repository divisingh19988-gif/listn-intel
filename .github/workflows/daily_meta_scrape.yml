name: Daily Meta Scrape

# GitHub cron is UTC-only. 09:00 UTC = 11:00 CEST (summer) / 10:00 CET (winter).
# We pick CEST (the user's requested time) and accept a 1-hour drift in winter.
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Run Meta scraper
        run: python scrapers/scrape_ads.py

      - name: Validate scrape output
        run: |
          python3 -c "import glob, json, os, sys; files = glob.glob('ads_scraped_*.json'); files or sys.exit('No ads_scraped_*.json file found'); data = json.load(open(max(files, key=os.path.getmtime))); count = data.get('total_ads') or sum(len(v) for v in data.get('competitors', {}).values()); count >= 5 or sys.exit(f'Health check failed - only {count} ads found (need >= 5)'); print(f'Health check passed: {count} ads found')"

      - name: Promote to data/ads_scraped_latest.json
        run: |
          mkdir -p data
          LATEST=$(ls -t ads_scraped_*.json 2>/dev/null | head -1)
          [ -n "$LATEST" ] && cp "$LATEST" data/ads_scraped_latest.json
          echo "Promoted: $LATEST"

      - name: Commit fresh snapshot
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "Listn Intel Bot"
          git add data/ads_scraped_latest.json
          if git diff --staged --quiet; then
            echo "No changes — Meta returned the same ads as yesterday."
          else
            git commit -m "daily meta scrape: $(date -u +%Y-%m-%d)"
            git fetch origin main
            git rebase origin/main
            git push
          fi
