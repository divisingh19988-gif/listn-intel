name: Weekly Intelligence Refresh

on:
  schedule:
    - cron: '0 12 * * 1'   # Mondays 12:00 UTC
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium --with-deps

      - name: Fetch Meta ads (Playwright scraper)
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python scrapers/scrape_ads.py

      - name: Validate Meta scrape output
        run: |
          python3 -c "import glob, json, os, sys; files = glob.glob('data/ads_scraped_*.json'); files or sys.exit('No data/ads_scraped_*.json file found'); data = json.load(open(max(files, key=os.path.getmtime))); count = data.get('total_ads') or sum(len(v) for v in data.get('competitors', {}).values()); count >= 5 or sys.exit(f'Health check failed - only {count} ads found (need >= 5)'); print(f'Health check passed: {count} ads found')"

      # SEO data is secondary — a flaky DataForSEO run must not block the
      # Meta-data commit, so these two steps don't fail the job.
      - name: Fetch SEO data (DataForSEO)
        continue-on-error: true
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
        run: python scrapers/seo_monitor.py

      - name: Validate SEO scrape output
        continue-on-error: true
        run: |
          python3 -c "import glob, json, os, sys; files = glob.glob('data/seo_raw_*.json'); files or sys.exit('No data/seo_raw_*.json file found'); data = json.load(open(max(files, key=os.path.getmtime))); count = sum(len(v.get('keywords', [])) for v in data.get('competitors', {}).values()); count >= 5 or sys.exit(f'Health check failed - only {count} keywords found (need >= 5)'); print(f'Health check passed: {count} keywords found')"

      - name: Run AI Readiness audit
        run: python scrapers/ai_readiness_check.py

      - name: Generate strategic ad brief (Claude analysis)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python analyze_ads.py

      # Claude reviews the dashboard for non-deterministic staleness issues
      # (wrong dates baked in, placeholders left in production, contradictions
      # the rule-based sweep can't see). continue-on-error so a flaky API
      # call doesn't block the rest of the refresh — last week's findings
      # stay on disk if this run fails.
      - name: Run dashboard hygiene review
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m lib.dashboard_hygiene

      - name: Generate Excel reports and send email
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scrapers/weekly_export.py

      - name: Commit updated data and reports
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name "Listn Intel Bot"
          git add data/ reports/
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "weekly refresh: $(date -u +%Y-W%V)"
            git fetch origin main
            git rebase -X theirs origin/main
            git push   # fail the job if the push doesn't land
          fi

      - name: Record refresh completion
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python - <<'PYEOF'
          import os, requests
          requests.post(
              f"{os.environ['SUPABASE_URL']}/rest/v1/admin_audit",
              headers={
                  "apikey": os.environ["SUPABASE_SERVICE_ROLE_KEY"],
                  "Authorization": f"Bearer {os.environ['SUPABASE_SERVICE_ROLE_KEY']}",
                  "Content-Type": "application/json",
                  "Prefer": "return=minimal",
              },
              json={"table_name": "scraper_run", "action": "scraper_run",
                    "actor": "cron", "note": "Weekly refresh completed"},
          ).raise_for_status()
          print("Logged scraper_run to admin_audit")
          PYEOF

      - name: Send failure alert
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
        run: |
          python - <<'EOF'
          import os
          import requests

          requests.post(
              "https://api.resend.com/emails",
              headers={"Authorization": f"Bearer {os.environ['RESEND_API_KEY']}"},
              json={
                  "from": os.environ["RESEND_FROM_EMAIL"],
                  "to": os.environ["REPORT_EMAIL"],
                  "subject": "Listn Intel: weekly refresh FAILED",
                  "text": "The weekly intelligence refresh failed. Check: https://github.com/divisingh19988-gif/listn-intel/actions",
              },
          )
          EOF
